name: Deploy SIPI

# Deploy a STAGING (sipi.staging.europalaica.org): Fase 1 del enganche con ODM
# (BD + receptor ETL). Construye la imagen del ETL, la publica en GHCR y hace
# SSH-deploy con docker-compose.staging.yml.
#
# Se dispara en push a master (y manualmente con workflow_dispatch).
#
# Secrets requeridos en el repo:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY  → acceso SSH al servidor de staging
#   SIPI_ENV_PRODUCTION                   → contenido de .env.production (ver .env.staging.example)
#   DEPLOY_PATH (opcional)                → ruta del repo en el servidor (def. /opt/docker/apps/sipi)
on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# Un deploy a la vez; no cancelar uno en curso (puede estar migrando la BD).
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_PREFIX: ghcr.io/pepeluimoreno/sipi
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ETL (consumidor ODM)
        uses: docker/build-push-action@v5
        with:
          context: .                              # raíz del monorepo (necesita packages/sipi-core)
          file: services/discovery/etl/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-etl:latest
            ${{ env.IMAGE_PREFIX }}-etl:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-etl:latest
          cache-to: type=inline

      # Fase 2: añadir aquí el build-push de api (build desde la raíz + sipi-core
      # instalable) y frontend (con VITE_API_URL) cuando se despliegue todo SIPI.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      SIPI_ENV_PRODUCTION: ${{ secrets.SIPI_ENV_PRODUCTION }}
    steps:
      - name: Deploy to staging (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: SIPI_ENV_PRODUCTION
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}" 2>/dev/null || cd /opt/docker/apps/sipi
            git fetch --all --prune
            git checkout master
            git pull --ff-only
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            umask 077
            printf '%s\n' "$SIPI_ENV_PRODUCTION" > .env.production
            C="docker compose --env-file .env.production -f docker-compose.staging.yml"
            $C pull etl-webhook
            $C --profile migrate run --rm etl-migrate   # alembic upgrade head (idempotente)
            $C up -d --build --remove-orphans            # db + etl-webhook
            $C ps
            docker image prune -f
