name: Deploy SIPI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_PREFIX: ghcr.io/pepeluimoreno/sipi
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ETL (consumidor ODM)
        uses: docker/build-push-action@v5
        with:
          context: .                              # raíz del monorepo (necesita packages/sipi-core)
          file: services/discovery/etl/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-etl:latest
            ${{ env.IMAGE_PREFIX }}-etl:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-etl:latest
          cache-to: type=inline

      # NB: api y frontend ya tienen Dockerfile propio; añadir aquí sus build-push
      # cuando se quiera que este workflow despliegue todo el monorepo.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      SIPI_ENV_PRODUCTION: ${{ secrets.SIPI_ENV_PRODUCTION }}
    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: SIPI_ENV_PRODUCTION
          script: |
            cd /opt/docker/apps/sipi          # <-- ruta del repo en tu servidor
            git pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            umask 077
            printf '%s\n' "$SIPI_ENV_PRODUCTION" > .env.production
            COMPOSE="docker compose --env-file .env.production -f services/discovery/etl/docker-compose.prod.yml"
            $COMPOSE pull
            $COMPOSE --profile migrate run --rm etl-migrate   # migración idempotente (alembic upgrade head)
            $COMPOSE up -d --remove-orphans
            $COMPOSE ps
            docker image prune -f
