name: Deploy SIPI

# Deploy a STAGING (sipi.pepelui.es): stack completo de SIPI
# (BD + API + frontend + receptor ETL). Construye las imágenes (api, frontend, etl),
# las publica en GHCR y hace SSH-deploy con docker-compose.staging.yml.
#
# Se dispara en push a master (y manualmente con workflow_dispatch).
#
# Secrets requeridos en el repo:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY  → acceso SSH al servidor de staging
#   SIPI_ENV_PRODUCTION                   → contenido de .env.production (ver .env.staging.example)
#   DEPLOY_PATH (opcional)                → ruta del repo en el servidor (def. /opt/docker/apps/sipi)
on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# Un deploy a la vez; no cancelar uno en curso (puede estar migrando la BD).
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_PREFIX: ghcr.io/pepeluimoreno/sipi
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API (GraphQL + sipi-core)
        uses: docker/build-push-action@v5
        with:
          context: .                              # raíz del monorepo (necesita packages/sipi-core)
          file: apps/sipi/api/Dockerfile.staging
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-api:latest
          cache-to: type=inline

      - name: Build and push frontend (SPA + nginx)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/sipi/frontend
          file: ./apps/sipi/frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-to: type=inline

      - name: Build and push ETL (consumidor ODM)
        uses: docker/build-push-action@v5
        with:
          context: .                              # raíz del monorepo (necesita packages/sipi-core)
          file: services/discovery/etl/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-etl:latest
            ${{ env.IMAGE_PREFIX }}-etl:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-etl:latest
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      SIPI_ENV_PRODUCTION: ${{ secrets.SIPI_ENV_PRODUCTION }}
    steps:
      - name: Deploy to staging (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: SIPI_ENV_PRODUCTION
          script: |
            set -e
            REPO=https://github.com/PepeluiMoreno/sipi.git
            DIR="${{ secrets.DEPLOY_PATH }}"; [ -n "$DIR" ] || DIR=/opt/docker/apps/sipi
            # Auto-clonable: si el dir no es un repo git, (re)clónalo. Evita el
            # "fatal: not a git repository" cuando el directorio existe sin .git.
            if [ -d "$DIR/.git" ]; then
              cd "$DIR"
              git fetch --all --prune
              git checkout master
              git reset --hard origin/master
            else
              rm -rf "$DIR"
              mkdir -p "$(dirname "$DIR")"
              git clone "$REPO" "$DIR"
              cd "$DIR"
              git checkout master
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            umask 077
            printf '%s\n' "$SIPI_ENV_PRODUCTION" > .env.production
            C="docker compose --env-file .env.production -f docker-compose.staging.yml"
            $C pull api frontend etl-webhook
            $C --profile migrate run --rm etl-migrate   # alembic upgrade head (idempotente)
            $C up -d --build --remove-orphans            # db (build) + api + frontend + etl-webhook
            $C ps
            docker image prune -f
