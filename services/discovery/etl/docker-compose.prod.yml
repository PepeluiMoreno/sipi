# Producción del ETL consumidor de ODM. Imagen publicada por el workflow a GHCR.
# Tres servicios sobre la misma imagen:
#   - etl-webhook : receptor incremental (long-running)
#   - etl-poblar  : backfill one-shot (perfil "poblar", ejecutar a demanda)
#   - etl-migrate : migración one-shot de sipi-core (perfil "migrate")
services:
  etl-webhook:
    image: ghcr.io/pepeluimoreno/sipi-etl:latest
    container_name: sipi_etl_webhook
    restart: unless-stopped
    environment:
      SIPI_ETL_MODE: webhook
      DATABASE_URL: ${DATABASE_URL}
      ODM_BASE_URL: ${ODM_BASE_URL}
      ODM_APP_TOKEN: ${ODM_APP_TOKEN:-}
      ODM_WEBHOOK_SECRET: ${ODM_WEBHOOK_SECRET}
    networks: [traefik_public]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # Ajusta el Host() a tu dominio del receptor ETL:
      - "traefik.http.routers.sipi-etl.rule=Host(`etl.sipi.example`)"
      - "traefik.http.services.sipi-etl.loadbalancer.server.port=8000"

  etl-poblar:
    image: ghcr.io/pepeluimoreno/sipi-etl:latest
    container_name: sipi_etl_poblar
    profiles: ["poblar"]          # docker compose --profile poblar run --rm etl-poblar
    environment:
      SIPI_ETL_MODE: poblar
      POBLAR_ARGS: ${POBLAR_ARGS:---todo}
      DATABASE_URL: ${DATABASE_URL}
      ODM_BASE_URL: ${ODM_BASE_URL}
      ODM_APP_TOKEN: ${ODM_APP_TOKEN:-}
    networks: [traefik_public]

  # Migración one-shot de sipi-core (perfil "migrate"):
  #   docker compose --env-file .env.production -f services/discovery/etl/docker-compose.prod.yml --profile migrate run --rm etl-migrate
  etl-migrate:
    image: ghcr.io/pepeluimoreno/sipi-etl:latest
    profiles: ["migrate"]
    environment:
      SIPI_ETL_MODE: migrate
      DATABASE_URL: ${DATABASE_URL}
      APP_SCHEMA: ${APP_SCHEMA:-app}
      GIS_SCHEMA: ${GIS_SCHEMA:-gis}
      DEFAULT_SCHEMA: ${APP_SCHEMA:-app}
    networks: [traefik_public]

networks:
  traefik_public:
    external: true
