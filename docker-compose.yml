services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: sipi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sipi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sipi}
      POSTGRES_DB: ${POSTGRES_DB:-sipi}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_duration=on"
      - "-c"
      - "log_min_duration_statement=1000"
    volumes:
      # Solo datos persistentes, NO código
      - sipi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sipi} -d ${POSTGRES_DB:-sipi}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - sipi-network
    shm_size: 256mb

  graphql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sipi-graphql
    environment:
      # Variables de entorno
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sipi:sipi@db:5432/sipi}
      GRAPHQL_HOST: ${GRAPHQL_HOST:-0.0.0.0}
      GRAPHQL_PORT: ${GRAPHQL_PORT:-8040}
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      APP_SCHEMA: ${DATABASE_SCHEMA:-sipi}
      PYTHONPATH: /code:/code/sipi_core
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${GRAPHQL_HOST_PORT:-${GRAPHQL_PORT:-8040}}:${GRAPHQL_PORT:-8040}"
    restart: unless-stopped
    networks:
      - sipi-network
    volumes:
      - ./app:/code/app:ro
      - ./alembic:/code/alembic:ro
      - ../SIPI-CORE/sipi_core:/code/sipi_core:ro
      - sipi_logs:/code/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
  
  minio:
    image: minio/minio:latest
    container_name: sipi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sipi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sipi_minio_secret}
    volumes:
      - sipi_minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - sipi-network

  minio-init:
    image: minio/mc:latest
    container_name: sipi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sipi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sipi_minio_secret}
      MINIO_API_URL: http://minio:9000
    entrypoint: >
      /bin/sh -c "
        mc alias set local $${MINIO_API_URL} $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/sipi-media &&
        mc anonymous set download local/sipi-media/inmuebles &&
        echo 'MinIO inicializado: bucket sipi-media creado'
      "
    networks:
      - sipi-network
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sipi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sipi.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      # Solo datos persistentes
      - sipi_pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["pgadmin"]
    networks:
      - sipi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sipi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  sipi_minio_data:
    name: sipi_minio_data
    driver: local
  sipi_pgdata:
    name: sipi_pgdata
    driver: local
  sipi_logs:
    name: sipi_logs
    driver: local
  sipi_pgadmin_data:
    name: sipi_pgadmin_data
    driver: local
  
 