# Orquestación raíz del monorepo SIPI (desarrollo).
# Reusa el volumen de datos existente `sipi_pgdata` (no se pierde nada).
# Esquema B: todo en `sipi`. Acceso vía Traefik como ${APP_DEV_DOMAIN:-sipi.optiplex-790}
# (mismo patrón que SIGA: red externa traefik_public + labels en frontend y api).
services:
  db:
    build:
      context: ./apps/sipi/api
      dockerfile: Dockerfile.postgres
    container_name: sipi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sipi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sipi}
      POSTGRES_DB: ${POSTGRES_DB:-sipi}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    volumes:
      - sipi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sipi} -d ${POSTGRES_DB:-sipi}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks: [sipi-network]
    shm_size: 256mb

  api:
    build:
      context: ./apps/sipi/api
      dockerfile: Dockerfile
    container_name: sipi-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sipi:sipi@db:5432/sipi}
      # Esquema B: todo en sipi
      APP_SCHEMA: sipi
      GIS_SCHEMA: sipi
      DEFAULT_SCHEMA: sipi
      DATABASE_SCHEMA: sipi
      DEFINED_SCHEMAS: sipi
      GRAPHQL_HOST: ${GRAPHQL_HOST:-0.0.0.0}
      GRAPHQL_PORT: ${GRAPHQL_PORT:-8040}
      PYTHONPATH: /code:/code/sipi_core
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${GRAPHQL_HOST_PORT:-8040}:${GRAPHQL_PORT:-8040}"
    restart: unless-stopped
    # La API no se expone en Traefik: el frontend (vite) reenvía /graphql a api:8040
    # por la red interna (proxy en vite.config.js). Puerto 8040 publicado solo para debug.
    networks: [sipi-network]
    volumes:
      - ./apps/sipi/api/app:/code/app:ro
      # packages/sipi-core es la única fuente de modelos
      - ./packages/sipi-core/src/sipi_core:/code/sipi_core:ro

  frontend:
    build:
      context: ./apps/sipi/frontend
      dockerfile: Dockerfile.dev
    container_name: sipi-frontend
    environment:
      # Mismo origen: el navegador llama a /graphql y vite lo reenvía a la API.
      VITE_API_URL: ${VITE_API_URL:-/graphql/}
      VITE_API_TARGET: ${VITE_API_TARGET:-http://api:8040}
    restart: unless-stopped
    networks: [sipi-network, traefik_public]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # HTTP (catch-all del host → frontend Vite)
      - "traefik.http.routers.${APP_PREFIX:-sipi}.rule=Host(`${APP_DEV_DOMAIN:-sipi.optiplex-790}`)"
      - "traefik.http.routers.${APP_PREFIX:-sipi}.entrypoints=web"
      - "traefik.http.services.${APP_PREFIX:-sipi}.loadbalancer.server.port=5173"
      # HTTPS (cert auto-firmado de Traefik, sin Let's Encrypt)
      - "traefik.http.routers.${APP_PREFIX:-sipi}-tls.rule=Host(`${APP_DEV_DOMAIN:-sipi.optiplex-790}`)"
      - "traefik.http.routers.${APP_PREFIX:-sipi}-tls.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX:-sipi}-tls.tls=true"
      - "traefik.http.routers.${APP_PREFIX:-sipi}-tls.service=${APP_PREFIX:-sipi}"

  # ETL consumidor de ODM (DEV: build local, sin GHCR). Opt-in con `--profile etl`.
  #   Migrar BD:        docker compose --profile etl run --rm -e SIPI_ETL_MODE=migrate etl
  #   Backfill one-shot: docker compose --profile etl run --rm -e SIPI_ETL_MODE=poblar etl
  #   Receptor webhook:  docker compose --profile etl up -d etl     (modo por defecto)
  etl:
    build:
      context: .
      dockerfile: services/discovery/etl/Dockerfile
    image: sipi-etl:dev
    container_name: sipi-etl
    profiles: ["etl"]
    environment:
      SIPI_ETL_MODE: ${SIPI_ETL_MODE:-webhook}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sipi:sipi@db:5432/sipi}
      # Esquema B: todo en sipi (igual que la API)
      APP_SCHEMA: sipi
      GIS_SCHEMA: sipi
      DEFAULT_SCHEMA: sipi
      DATABASE_SCHEMA: sipi
      # Conexión a ODM (rellenar en .env cuando se use poblar/webhook)
      ODM_BASE_URL: ${ODM_BASE_URL:-}
      ODM_WEBHOOK_SECRET: ${ODM_WEBHOOK_SECRET:-}
      ODM_APP_TOKEN: ${ODM_APP_TOKEN:-}
      POBLAR_ARGS: ${POBLAR_ARGS:---todo}
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    networks: [sipi-network]
    restart: unless-stopped

  # Scheduler de vigilancia (DEV, opt-in): ejecuta los procesos en su frecuencia_cron.
  #   docker compose --profile vigilancia up -d vigilancia-scheduler
  vigilancia-scheduler:
    image: python:3.11-slim
    container_name: sipi-vigilancia-scheduler
    profiles: ["vigilancia"]
    command: sh -c "pip install --no-cache-dir croniter >/dev/null 2>&1 && python /app/scheduler_vigilancia.py"
    environment:
      SIPI_API_URL: ${SIPI_API_URL:-http://api:8040/graphql/}
      SCHED_INTERVAL: ${SCHED_INTERVAL:-60}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./services/discovery/survey/scripts/scheduler_vigilancia.py:/app/scheduler_vigilancia.py:ro
    depends_on: [api]
    networks: [sipi-network]
    restart: unless-stopped

networks:
  sipi-network:
    driver: bridge
  traefik_public:
    external: true

volumes:
  sipi_pgdata:
    name: sipi_pgdata
    external: true
